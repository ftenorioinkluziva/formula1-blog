services:
  f1_blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1_blog
    restart: unless-stopped
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3000"
    volumes:
      - f1_blog_recordings:/app/data/recordings

volumes:
  f1_blog_recordings:
