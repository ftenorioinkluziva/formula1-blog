name: f1blog

services:
  postgres:
    image: postgres:16
    container_name: f1blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: f1blog_user
      POSTGRES_PASSWORD: vA29HAUabVbIVs15OpqhAVXKNvaDqk7B
      POSTGRES_DB: f1blog
    volumes:
      - f1blog_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1blog_user -d f1blog"]
      interval: 5s
      timeout: 5s
      retries: 20

  f1_blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1_blog
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.deploy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3000"
    volumes:
      - f1_blog_recordings:/app/data/recordings
      - ./data/news-sync:/app/data/news-sync

  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    container_name: f1_telegram_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.deploy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/news-sync:/app/data/news-sync


volumes:
  f1_blog_recordings:
  f1blog_postgres_data:
